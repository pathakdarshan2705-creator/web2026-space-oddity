    <div class="brief">
      <h1>03: Gallery</h1>
      <p>
        The HTML is done, so write the CSS. Center the featured image in its area both across and
        down, then lay the three thumbnails out as an even row beneath it. Match
        <code>goal.png</code>, following the TODOs in <code>style.css</code>.
      </p>
      <img
        class="goal"
        src="goal.png"
        alt="A large featured image centered in a band, with a row of three smaller images beneath it"
      />
    </div>

    <section class="featured">
      <figure>
        <img src="images/wheat-field.jpg" alt="Wheat Field with Cypresses by Vincent van Gogh" />
        <figcaption>Van Gogh, Wheat Field with Cypresses, 1889</figcaption>
      </figure>
    </section>

    <section class="thumbs">
      <figure>
        <img src="images/great-wave.jpg" alt="The Great Wave off Kanagawa by Hokusai" />
        <figcaption>Hokusai, The Great Wave</figcaption>
      </figure>
      <figure>
        <img src="images/water-pitcher.jpg" alt="Young Woman with a Water Pitcher by Vermeer" />
        <figcaption>Vermeer, Water Pitcher</figcaption>
      </figure>
      <figure>
        <img src="images/harvesters.jpg" alt="The Harvesters by Bruegel" />
        <figcaption>Bruegel, The Harvesters</figcaption>
      </figure>
    </section>
